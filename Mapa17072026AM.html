<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8" />
    <title>Mapa de Contingencia SAMU - 17 de Julio 2026 (Modo Claro)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }
        /* Ajuste de la leyenda para que contraste bien pero no sea tan oscura */
        .legend {
            position: fixed;
            bottom: 30px;
            left: 15px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            border: 2px solid #ccc;
            border-radius: 10px;
            padding: 14px 16px;
            font-family: Arial, sans-serif;
            color: #333;
            min-width: 250px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .legend-title { font-size: 13px; color: #d32f2f; font-weight: bold; }
        .legend-subtitle { font-size: 11px; color: #555; font-weight: bold; margin-top: 8px; }
        .legend hr { border-color: #ddd; margin: 7px 0; }
        .icon-box {
            display: inline-block;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            margin-right: 8px;
            vertical-align: middle;
            border: 2px solid rgba(0,0,0,0.2);
            text-align: center;
            line-height: 14px;
            font-size: 10px;
        }
        .icon-red { background: #e60026; }
        .icon-darkred { background: #800000; }
        .icon-orange { background: #ff8000; }
        .icon-purple { background: #800080; }
        .icon-blue { background: #0000ff; }
        .icon-black { background: #000000; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="legend">
        <div class="legend-title">⚠️ MAPA DE RIESGO RM - SAMU</div>
        <small style="color:#666;">Actualización 17 Jul 2026, 09:00 hrs</small>
        <hr>
        <div class="legend-subtitle">SIMBOLOGÍA</div>
        <div style="margin:5px 0;"><span class="icon-box icon-red">🚗</span><span style="font-size:12px;">Paso Bajo Nivel (Corte)</span></div>
        <div style="margin:5px 0;"><span class="icon-box icon-orange">💧</span><span style="font-size:12px;">Anegamiento Ejes Viales</span></div>
        <div style="margin:5px 0;"><span class="icon-box icon-darkred">🌊</span><span style="font-size:12px;">Desborde de Cauce</span></div>
        <div style="margin:5px 0;"><span class="icon-box icon-black">⛰</span><span style="font-size:12px;">Remoción / Ruta Cortada</span></div>
        <div style="margin:5px 0;"><span class="icon-box icon-purple">⚡</span><span style="font-size:12px;">Incidente Fatal (Eléctrico)</span></div>
        <div style="margin:5px 0;"><span class="icon-box icon-blue">🚑</span><span style="font-size:12px;">Bases SAMU</span></div>
    </div>
    
    <script>
        var map = L.map('map').setView([-33.45, -70.65], 10);
        
        // Capa de OpenStreetMap estándar para máxima claridad de las calles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors',
            maxZoom: 19
        }).addTo(map);

        function createCustomIcon(color, emoji) {
            return L.divIcon({
                html: '<div style="font-size:16px;line-height:22px;text-align:center;width:26px;height:26px;border-radius:50%;background:'+color+';border:2px solid rgba(255,255,255,0.9);box-shadow:0 2px 6px rgba(0,0,0,0.5);">'+emoji+'</div>',
                iconSize: [26, 26],
                iconAnchor: [13, 13],
                className: 'empty'
            });
        }

        var points = [
            [-33.522, -70.683, "<b>Paso Lo Sierra</b><br>Inundado. Tránsito suspendido.", "#e60026", "🚗", "Lo Espejo"],
            [-33.571, -70.668, "<b>Paso Las Ovejas EFE</b><br>Inundado nivel vía.", "#e60026", "🚗", "El Bosque"],
            [-33.484, -70.645, "<b>Paso Departamental / Gran Avenida</b><br>Anegamiento severo.", "#e60026", "🚗", "San Miguel"],
            [-33.447, -70.719, "<b>Paso Av. Ecuador / Isla Decepción</b><br>Inundado.", "#e60026", "🚗", "Lo Prado"],
            [-33.443, -70.782, "<b>Paso Teniente Cruz / Ruta 68</b><br>Restricción de paso.", "#e60026", "🚗", "Pudahuel"],
            [-33.592, -70.721, "<b>Paso Balmaceda</b><br>Inundado.", "#e60026", "🚗", "San Bernardo"],
            [-33.578, -70.718, "<b>Paso San José / Línea Férrea</b><br>Inundado.", "#e60026", "🚗", "San Bernardo"],
            [-33.587, -70.715, "<b>Paso O'Higgins / EFE</b><br>Inundado.", "#e60026", "🚗", "San Bernardo"],
            
            [-33.508, -70.780, "<b>Canal Santa Marta</b><br>Desborde activo paralelo a Lo Espejo.", "#800000", "🌊", "Maipú"],
            [-33.658, -70.933, "<b>Campamento El Telar</b><br>Lecho Río Maipo. Evacuación activa.", "#800000", "🌊", "Talagante"],
            [-33.675, -71.018, "<b>Campamentos Río Mapocho</b><br>Sector Pedro de Valdivia. Alto Peligro.", "#800000", "🌊", "El Monte"],
            
            [-33.648, -70.362, "<b>Ruta G-21 CERRADA</b><br>Múltiples derrumbes.", "#000000", "⛰", "Cajón del Maipo"],
            [-33.753, -70.262, "<b>San Alfonso / El Volcán</b><br>Remoción activa en alta cordillera.", "#000000", "⛰", "Cajón del Maipo"],
            [-33.505, -70.552, "<b>Quebrada de Macul</b><br>Monitoreo aluvional.", "#ff8000", "⛰", "La Florida"],
            [-33.467, -70.558, "<b>Quebrada Nido de Águila</b><br>Laderas activas.", "#ff8000", "⛰", "Peñalolén"],
            
            [-33.425, -70.748, "<b>INCIDENTE FATAL</b><br>Av. La Estrella c/ Los Conquistadores. Riesgo Eléctrico.", "#800080", "⚡", "Cerro Navia"],
            [-33.195, -70.686, "<b>Base SAMU 25</b><br>Operativa. Acumulación transitable en Calle B.", "#0000ff", "🚑", "Colina"],
            [-33.432, -70.746, "<b>Base SAMU 58</b><br>Operativa. Desvíos activos por incidentes.", "#0000ff", "🚑", "Cerro Navia"],
            [-33.598, -70.706, "<b>Base SAMU 30</b><br>Operativa. Acumulación en San Alfonso.", "#0000ff", "🚑", "San Bernardo"],
            
            [-33.495, -70.758, "<b>Nudo Vespucio / Pajaritos</b><br>Anegamiento radial.", "#ff8000", "💧", "Maipú"],
            [-33.505, -70.625, "<b>Av. Lo Ovalle c/ Las Industrias</b><br>Anegamiento macro-comunal.", "#ff8000", "💧", "San Joaquín"],
            [-33.570, -70.633, "<b>Av. Observatorio c/ Teniente Cruz</b><br>Cota plana muy baja, anegada.", "#ff8000", "💧", "La Pintana"]
        ];

        points.forEach(function(p) {
            L.marker([p[0], p[1]], {icon: createCustomIcon(p[3], p[4])})
             .bindPopup("<div style='font-family:Arial; font-size:12px; color:#333;'>" + p[2] + "</div>")
             .bindTooltip(p[5])
             .addTo(map);
        });
    </script>
</body>
</html>
